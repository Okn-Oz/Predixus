services:
  predixus-api:
    build:
      context: .
      dockerfile: src/Predixus.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=predixus-db;Port=5432;Database=predixus;Username=postgres;Password=predixus123
      - Jwt__SecretKey=predixus-super-secret-key-minimum-32-characters
      - Jwt__Issuer=predixus-api
      - Jwt__Audience=predixus-client
      - Jwt__ExpirationMinutes=60
      - Jwt__RefreshTokenExpirationDays=7
      - Redis__ConnectionString=predixus-redis:6379
      - MlService__BaseUrl=http://predixus-ml:8000
      - MlService__TimeoutSeconds=30
      - MlService__RetryCount=2
      - YahooFinance__BaseUrl=https://query1.finance.yahoo.com
      - YahooFinance__RequestDelayMs=500
    depends_on:
      predixus-db:
        condition: service_healthy
      predixus-redis:
        condition: service_healthy
      predixus-ml:
        condition: service_started
    restart: unless-stopped

  predixus-ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  predixus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: predixus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: predixus123
    ports:
      - "5433:5432"
    volumes:
      - predixus-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  predixus-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  predixus-db-data:
